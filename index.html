<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>DS One - 私有云 & 媒体中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DS One 是一款集 NAS 管理、影音播放、音乐、电台、电子书于一体的全能 App。" />

  <style>
    :root {
      --card: rgba(17, 24, 39, 0.85);
      --text: #e5e7eb;
      --sub: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --chip: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(56,189,248,0.25), transparent 40%),
        radial-gradient(1000px 500px at 85% 10%, rgba(168,85,247,0.25), transparent 45%),
        radial-gradient(800px 400px at 50% 90%, rgba(14,165,233,0.18), transparent 50%),
        linear-gradient(180deg, #020617 0%, #020617 100%);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 72px;
      font-size: 30px;
    }

    .subtitle {
      color: var(--sub);
      font-size: 18px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-top: 28px;
    }

    /* 品牌区 */
    .brand {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.1);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    /* 平台标签 */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .chip {
      padding: 6px 12px;
      font-size: 14px;
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #e5e7eb;
    }

    /* Store */
    .store-badges {
      display: flex;
      gap: 16px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .store-badge {
      height: 60px;
      transition: transform .15s ease, opacity .15s ease;
    }

    .store-badge:hover {
      transform: scale(1.05);
      opacity: .9;
    }

    /* 截图 */
    .screenshots {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-top: 28px;
    }

    .screenshots img {
      height: 420px;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,.4);
      transition: transform .25s ease;
    }

    .screenshots img:hover {
      transform: translateY(-6px) scale(1.02);
    }

    /* Footer */
    .footer {
      margin-top: 120px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
      .app-icon { width: 64px; height: 64px; }
      .screenshots img { height: 320px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="brand">
      <img src="assets/images/app-icon.png" class="app-icon" />
      <div>
        <h1>DS One</h1>
        <p class="subtitle">私有云 · NAS · 影音 · 音乐 · 电台 · 电子书</p>

        <div class="chips">
          <span class="chip">iOS</span>
          <span class="chip">Android</span>
          <span class="chip">CarPlay</span>
          <span class="chip">Apple TV</span>
        </div>
      </div>
    </div>

    <!-- Intro -->
    <div class="card">
      <p>
        DS One 是一款为个人用户打造的全能型应用，
        深度支持群晖 NAS、Emby、Jellyfin、Navidrome，
        集文件管理、Docker 管理、影音与音乐播放于一体，
        专注于 <strong>私有数据 + 高质量播放体验</strong>。
      </p>

      <div class="store-badges">
        <a href="https://apps.apple.com/cn/app/id6476057278" target="_blank">
          <img src="assets/images/appstore-badge.svg" class="store-badge" />
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.cz.player.dsone" target="_blank">
          <img src="assets/images/googleplay-badge.svg" class="store-badge" />
        </a>
      </div>
    </div>

    <!-- Screenshots -->
    <h2>App 截图</h2>
    <div class="screenshots">
      <img src="assets/images/screenshot-1.png" />
      <img src="assets/images/screenshot-2.png" />
      <img src="assets/images/screenshot-3.png" />
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2026 大为 · DS One<br/>
      Built with GitHub Pages
    </div>

  </div>
</body>
</html>
